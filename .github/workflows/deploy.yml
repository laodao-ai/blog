name: Deploy Blog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-summary:
    name: Quality gate · check-summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # 不需要 submodules（仅扫描 content/posts/**/index.md）

      - name: Run check-summary script
        run: bash scripts/check-summary.sh

  deploy-com:
    name: Build and deploy · laodao-ai.com
    needs: check-summary
    # 仅在 push 到 main 时部署；PR 只跑 check-summary
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.161.1"
          extended: true

      - name: Build
        run: hugo --environment production-com --minify --gc

      - name: Build Pagefind index
        run: npx -y pagefind@latest --site public

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            ./public/ deploy@$VPS_HOST:

      - name: Health check
        run: |
          curl -f --retry 3 --retry-delay 2 https://laodao-ai.com

      - name: Purge Cloudflare cache
        # rsync + health check 通过后清掉 CF edge 缓存，避免 max-age=14400 期间用户看到旧版。
        # 需 GitHub Secrets: CF_API_TOKEN (Zone:Cache Purge), CF_ZONE_ID_COM (laodao-ai.com Zone ID)
        # 任一 secret 缺失则跳过此步（不影响主部署）。仅使用 secrets.* 上下文，不消费用户输入，无注入风险。
        if: ${{ env.CF_API_TOKEN != '' && env.CF_ZONE_ID != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID_COM }}
        run: |
          response=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$response"
          echo "$response" | grep -q '"success":true' \
            || { echo "::error::Cloudflare purge failed"; exit 1; }
          echo "✓ Cloudflare cache purged for laodao-ai.com"

  deploy-cn:
    name: Build and deploy · laodao-ai.cn
    needs: check-summary
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.161.1"
          extended: true

      - name: Build
        run: hugo --environment production-cn --minify --gc

      - name: Build Pagefind index
        run: npx -y pagefind@latest --site public

      - name: Configure SSH
        env:
          DEPLOY_CN_SSH_KEY: ${{ secrets.DEPLOY_CN_SSH_KEY }}
          KNOWN_HOSTS_CN: ${{ secrets.KNOWN_HOSTS_CN }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_CN_SSH_KEY" > ~/.ssh/deploy_cn_key
          chmod 600 ~/.ssh/deploy_cn_key
          echo "$KNOWN_HOSTS_CN" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          VPS_CN_HOST: ${{ secrets.VPS_CN_HOST }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_cn_key -o StrictHostKeyChecking=yes" \
            ./public/ deploy@$VPS_CN_HOST:

      - name: Health check
        run: |
          curl -f --retry 3 --retry-delay 2 https://laodao-ai.cn
