{{- /*
  terms.html · v3 editorial taxonomy 索引页（/categories/, /tags/, /series/）
  渲染所有 taxonomy 词条 + 计数
*/ -}}
{{ define "main" }}
<div class="article-wrap">
  <header class="article-header">
    <h1 class="article-title">{{ .Title }}</h1>
    {{- with .Description -}}<p class="article-deck">{{ . }}</p>{{- end -}}
  </header>

  <section class="list-body">
    <ul class="taxonomy-grid">
      {{- range .Pages.ByTitle -}}
        <li class="taxonomy-item">
          <a href="{{ .RelPermalink }}" class="taxonomy-link">
            <span class="taxonomy-name">{{ .Title }}</span>
            <span class="taxonomy-count">{{ len .Pages }}</span>
          </a>
        </li>
      {{- end -}}
    </ul>
  </section>
</div>
{{ end }}
