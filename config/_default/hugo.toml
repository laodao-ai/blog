theme = "blowfish"
baseURL = "https://laodao-ai.com"
defaultContentLanguage = "zh-cn"

enableRobotsTXT = false
enableGitInfo = true
enableEmoji = true
hasCJKLanguage = true

buildDrafts = false
buildFuture = false

[permalinks]
  posts = "/posts/:slug/"

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[outputFormats.llmstxt]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true

[outputFormats.llmsfulltxt]
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true

[outputFormats.markdown]
  mediaType = "text/markdown"
  baseName = "index"
  isPlainText = true

[related]
  threshold = 0
  toLower = false

  [[related.indices]]
    name = "tags"
    weight = 100

  [[related.indices]]
    name = "categories"
    weight = 100

  [[related.indices]]
    name = "series"
    weight = 50

  [[related.indices]]
    name = "date"
    weight = 10
